<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Movimientos - Yape</title>
    <style>
        :root {
            --yape-purple: #742284;
            --yape-teal: #00d1B2;
            --text-dark: #313131;
            --text-grey: #8e8e8e;
            --amount-red: #eb5757;
            --border-color: #f2f2f2;
        }

        /* Configuración para que parezca App Nativa */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-user-select: none; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body { 
            background-color: white; 
            height: 100vh; 
            height: 100svh; 
            width: 100vw; 
            overflow: hidden; 
            position: fixed; 
        }

        /* VISTA 1: LISTA DE MOVIMIENTOS - Ajustado display a none para evitar flasheo */
        #vista-historial {
            display: none; 
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .header {
            background-color: var(--yape-purple);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            flex-shrink: 0;
            padding-top: env(safe-area-inset-top);
        }

        .back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .header-title { flex: 1; text-align: center; font-size: 18px; font-weight: 500; }
        .header-icons { display: flex; gap: 12px; align-items: center; }
        .header-icons img { width: 24px; height: auto; }

        .content { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .promo-banner-top { padding: 12px 11px; background: #fff; }
        .promo-banner-top img { 
          width: 100%; 
          height: 140px;
        border-radius: 5px; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.06); }

        .month-header { padding: 15px 20px 8px; color: var(--yape-purple); font-weight: 700; font-size: 16px; }
        .mov-item { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .mov-item:active { background-color: #f9f9f9; } 
        
        .mov-name { font-weight: 700; font-size: 15px; color: var(--text-dark); margin-bottom: 4px; display: block; }
        .mov-date { font-size: 14px; color: var(--text-grey); }
        .mov-amount { font-weight: 800; font-size: 15px; color: var(--amount-red); }

        /* VISTA 2: DETALLE / CAPTURA - ADAPTADA A TODA PANTALLA */
        #vista-detalle {
            display: none;
            background-color: var(--yape-purple);
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .header-detalle {
            width: 100%; 
            min-height: 70px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            padding: env(safe-area-inset-top) 20px 0;
            flex-shrink: 0;
        }
        
        .logo-pey { 
            width: 100px; 
            height: auto; 
            transform: translateX(-15px);
        }
        
        .main-card { 
            width: 92%; 
            max-width: 400px; 
            background: white; 
            border-radius: 18px; 
            padding: 20px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            flex-shrink: 0;
            margin-bottom: 10px;
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .yapeaste-text { color: var(--yape-purple); font-weight: 800; font-size: 22px; }
        
        .share-container { display: flex; align-items: center; gap: 6px; }
        .share-text { color: var(--yape-teal); font-weight: 700; font-size: 15px; }

        .amount-big { color: #333; font-weight: 500; font-size: 48px; margin: 5px 0; }
        .amount-big span { font-size: 26px; font-weight: 700; margin-right: 4px; }

        .recip-name { font-weight: 700; font-size: 20px; color: #333; margin-bottom: 8px; }
        .time-line { color: #7d7d7d; font-size: 14px; margin-bottom: 15px; }

        .line { height: 1px; background: #f2f2f2; margin: 12px 0; }

        .sec-row { display: flex; justify-content: space-between; align-items: center; }
        .sec-label-container { display: flex; align-items: center; gap: 5px; }
        .sec-label { color: #888; font-size: 11px; font-weight: 700; }
        .sec-boxes { display: flex; gap: 5px; }
        .sec-box { width: 30px; height: 38px; background: #f4f6f9; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-weight: 700; }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .d-val { font-weight: 700; }

        .btn-teal {
            width: 92%; max-width: 400px; 
            background: var(--yape-teal); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px;
            margin-top: 15px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-help { color: white; font-weight: 600; font-size: 14px; margin: 15px 0; text-decoration: none; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        .banner-bottom { width: 92%; max-width: 400px; margin-top: 10px; border-radius: 15px; overflow: hidden; flex-shrink: 0; }
        .banner-bottom img { width: 100%; display: block; }

        .icon-info { display: none; }
        .show-icon .icon-info { display: block; }
    </style>
</head>
<body>

    <div id="vista-historial">
        <div class="header">
            <div class="back-btn" onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </div>
            <div class="header-title">Movimientos</div>
            <div class="header-icons">
                <img src="fin.jpg"><img src="fin2.jpg">
            </div>
        </div>

        <div class="content">
            <div class="promo-banner-top">
                <img src="fin3.jpg">
            </div>
            <div id="lista-movimientos"></div>
        </div>
    </div>

    <div id="vista-detalle">
        <div class="header-detalle">
            <img src="yp4.jpg" class="logo-pey">
            <div class="back-btn" onclick="cerrarDetalle()" style="background: rgba(255,255,255,0.1); border-radius: 50%;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
        </div>

        <div id="card-voucher" class="main-card">
            <div class="card-top">
                <span class="yapeaste-text">¡Yapeaste!</span>
                <div class="share-container">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00d1B2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                    <span class="share-text">Compartir</span>
                </div>
            </div>
            
            <div class="amount-big"><span>S/</span><label id="det-monto">0.00</label></div>
            <div id="det-nombre" class="recip-name">---</div>
            <div class="time-line"><span id="det-fecha">-- ---.</span> | <span id="det-hora">--:-- p. m.</span></div>

            <div id="wrapper-codigo">
                <div class="line"></div>
                <div class="sec-row">
                    <div class="sec-label-container" id="cont-icono-codigo">
                        <div class="sec-label">CÓDIGO DE SEGURIDAD</div>
                        <svg class="icon-info" width="15" height="15" viewBox="0 0 24 24" fill="#00d1B2">
                            <circle cx="12" cy="12" r="11"></circle>
                            <rect x="11" y="10" width="2" height="7" fill="white"></rect>
                            <circle cx="12" cy="7" r="1.5" fill="white"></circle>
                        </svg>
                    </div>
                    <div class="sec-boxes">
                        <div class="sec-box" id="c-1">-</div>
                        <div class="sec-box" id="c-2">-</div>
                        <div class="sec-box" id="c-3">-</div>
                    </div>
                </div>
            </div>

            <div class="line"></div>

            <div id="seccion-datos">
                <div class="sec-label-container" id="cont-icono-datos" style="margin-bottom:10px">
                    <div class="sec-label">DATOS DE LA TRANSACCIÓN</div>
                    <svg class="icon-info" width="15" height="15" viewBox="0 0 24 24" fill="#00d1B2">
                        <circle cx="12" cy="12" r="11"></circle>
                        <rect x="11" y="10" width="2" height="7" fill="white"></rect>
                        <circle cx="12" cy="7" r="1.5" fill="white"></circle>
                    </svg>
                </div>
                <div class="data-row" id="row-tel"><span>Nro. de celular</span><span id="det-tel" class="d-val">*** *** ***</span></div>
                <div class="data-row"><span>Destino</span><span id="det-destino" class="d-val">Yape</span></div>
                <div class="data-row"><span>Nro. de operación</span><span id="det-op" class="d-val">--------</span></div>
            </div>
        </div>

        <button class="btn-teal" onclick="window.location.href='index2.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(-10deg);">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            Nuevo Yapeo
        </button>
        
        <a href="#" class="btn-help">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
            </svg>
            Necesito Ayuda
        </a>

        <div class="banner-bottom">
            <img src="ba.jpg">
        </div>
    </div>

    <script>
        function formatearMonto(monto) {
            let n = parseFloat(monto);
            return n % 1 === 0 ? n.toString() : n.toFixed(2);
        }

        function cargarHistorial() {
            const container = document.getElementById('lista-movimientos');
            let historial = JSON.parse(localStorage.getItem('yape_historial')) || [];
            if (historial.length === 0) {
                container.innerHTML = '<p style="text-align:center; margin-top:50px; color:#999;">No hay movimientos</p>';
                return;
            }
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            let html = `<div class="month-header">${meses[new Date().getMonth()]} ${new Date().getFullYear()}</div>`;
            historial.forEach((mov, index) => {
                // Ajuste para mostrar "Destino - Nombre" solo en la lista
                let nombreAMostrar = mov.titulo;
                if (mov.esOtrosBancos && mov.bancoDestino) {
                    nombreAMostrar = `${mov.bancoDestino} - ${mov.titulo}`;
                }

                html += `<div class="mov-item" onclick='mostrarDetalle(${JSON.stringify(mov)}, ${index})'><div style="flex:1"><span class="mov-name">${nombreAMostrar}</span><span class="mov-date">${mov.fecha} - ${mov.hora}</span></div><div style="text-align:right"><span class="mov-amount">-S/ ${formatearMonto(mov.monto)}</span></div></div>`;
            });
            container.innerHTML = html;
        }

        function mostrarDetalle(mov, index) {
            document.getElementById('det-monto').innerText = formatearMonto(mov.monto);
            document.getElementById('det-nombre').innerText = (mov.esOtrosBancos && mov.titulo.includes(" - ")) ? mov.titulo.split(" - ")[1] : mov.titulo;
            document.getElementById('det-fecha').innerText = mov.fecha;
            document.getElementById('det-hora').innerText = mov.hora;
            document.getElementById('det-tel').innerText = mov.telefono || '*** *** ***';
            document.getElementById('det-destino').innerText = mov.esOtrosBancos ? mov.bancoDestino : "Yape";
            document.getElementById('det-op').innerText = mov.operacion || mov.op || '--------';
            const card = document.getElementById('card-voucher');
            const wrapperCodigo = document.getElementById('wrapper-codigo');
            const rowTel = document.getElementById('row-tel');
            const contIconoCodigo = document.getElementById('cont-icono-codigo');
            const contIconoDatos = document.getElementById('cont-icono-datos');
            if (mov.esOtrosBancos) {
                wrapperCodigo.style.display = "none";
                rowTel.style.display = "none";
                card.classList.add("card-index4");
                contIconoCodigo.classList.remove('show-icon');
                contIconoDatos.classList.remove('show-icon');
            } else {
                wrapperCodigo.style.display = "block";
                rowTel.style.display = "flex";
                card.classList.remove("card-index4");
                contIconoCodigo.classList.add('show-icon');
                contIconoDatos.classList.remove('show-icon');
                let codigo = mov.codigoSeguridad || [Math.floor(Math.random()*10), Math.floor(Math.random()*10), Math.floor(Math.random()*10)];
                if (!mov.codigoSeguridad) {
                    let historial = JSON.parse(localStorage.getItem('yape_historial'));
                    historial[index].codigoSeguridad = codigo;
                    localStorage.setItem('yape_historial', JSON.stringify(historial));
                }
                document.getElementById('c-1').innerText = codigo[0];
                document.getElementById('c-2').innerText = codigo[1];
                document.getElementById('c-3').innerText = codigo[2];
            }
            document.getElementById('vista-historial').style.display = 'none';
            document.getElementById('vista-detalle').style.display = 'flex';
            document.getElementById('vista-detalle').scrollTop = 0;
        }

        function cerrarDetalle() {
            document.getElementById('vista-detalle').style.display = 'none';
            document.getElementById('vista-historial').style.display = 'flex';
        }

        // --- LÓGICA DE CARGA OPTIMIZADA PARA EVITAR EL SALTO VISUAL ---
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const pos = params.get('pos');
            const view = params.get('view');

            if (pos !== null && view === 'voucher') {
                const historial = JSON.parse(localStorage.getItem('yape_historial')) || [];
                const movimiento = historial[pos];
                if (movimiento) {
                    // Si hay datos para el voucher, lo mostramos de frente
                    mostrarDetalle(movimiento, pos);
                } else {
                    // Si falla, mostramos el historial
                    document.getElementById('vista-historial').style.display = 'flex';
                    cargarHistorial();
                }
            } else {
                // Entrada normal: se muestra la lista
                document.getElementById('vista-historial').style.display = 'flex';
                cargarHistorial();
            }
        };
    </script>
</body>
</html>
